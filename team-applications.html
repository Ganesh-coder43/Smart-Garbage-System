<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Applications | Smart Grab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page team-applications-page">
    <header class="site-header center-header">
      <div class="brand brand-large">Smart Grab !</div>
      <button class="btn btn-back" onclick="window.location.href='index.html'">&larr; Back</button>
    </header>
    <main class="team-applications-panel">
      <h1>Team Applications</h1>
      <div id="teamCount" class="team-count-text" style="font-weight:600;color:#4F7C82;margin-bottom:18px;"></div>
      <div id="teamList"></div>
    </main>
  </div>
  <script>
    function getTeams() {
      return JSON.parse(localStorage.getItem('teams') || '[]');
    }
    function renderTeams() {
      const teams = getTeams();
      document.getElementById('teamCount').textContent = `Total Applications: ${teams.length}`;
      if (teams.length === 0) {
        document.getElementById('teamList').innerHTML = '<p>No team applications yet.</p>';
        return;
      }
      document.getElementById('teamList').innerHTML = teams.map((team, idx) => `
        <div class="team-app-box">
          <div class="team-app-title">${idx+1}. Team: <span class="team-app-teamname">${team.teamName}</span></div>
          <table class="team-app-members-table">
            <thead><tr><th>Name</th><th>Phone Number</th></tr></thead>
            <tbody>
              ${team.members.map(m => `<tr><td>${m.name}</td><td>${m.phone}</td></tr>`).join('')}
            </tbody>
          </table>
          <button class="delete-btn" onclick="deleteTeam(${idx})">Delete</button>
        </div>
      `).join('');
    }
    function deleteTeam(idx) {
      const teams = getTeams();
      if (confirm('Are you sure you want to delete this application?')) {
        teams.splice(idx, 1);
        localStorage.setItem('teams', JSON.stringify(teams));
        renderTeams();
      }
    }
    document.addEventListener('DOMContentLoaded', renderTeams);
    window.deleteTeam = deleteTeam;
  </script>

  <footer class="site-footer">
    <div class="footer-row">
      <div class="footer-left">
        <strong>Smart Grab</strong>
        <p>Community-based garbage reporting and clean teams coordination.</p>
      </div>
      <div class="footer-right">
        <p id="footerContact">Logged in as: unknown</p>
        <p id="footerContactHistory">Previous login(s): none</p>
        <p id="footerSupport"></p>
        <p><a href="privacy.html">Privacy Policy</a> | <a href="mailto:support@smartgrab.example">support@smartgrab.example</a> | <a href="tel:+911234567890">+91-12345-67890</a></p>
      </div>
    </div>
    <div class="footer-meta">&copy; 2026 Smart Grab. All rights reserved.</div>
  </footer>
</body>
</html>
